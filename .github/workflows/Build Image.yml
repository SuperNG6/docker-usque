name: 构建 usque Docker 镜像

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '可选：指定构建的上游 tag/分支/提交（留空则自动取上游最新 tag）'
        required: false
        default: ''
      upstream_repo:
        description: '可选：指定上游仓库（用于 BBR 分支或私有 fork）'
        required: false
        default: ''
      channel:
        description: '发布通道（stable 或 bbr）'
        required: false
        default: 'stable'
  schedule:
    - cron: '0 4 * * *'   # 每天 04:00 UTC 自动检查上游最新 tag

env:
  DOCKER_IMAGE: superng6/usque
  GHCR_IMAGE: ghcr.io/superng6/usque
  UPSTREAM_REPO: https://github.com/Diniboy1123/usque.git

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      upstream_repo: ${{ steps.set-version.outputs.upstream_repo }}
      resolved_sha: ${{ steps.set-version.outputs.resolved_sha }}
      channel: ${{ steps.set-version.outputs.channel }}
    steps:
      - name: 获取上游版本
        id: set-version
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          INPUT_UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          RAW_UPSTREAM_REPO="${INPUT_UPSTREAM_REPO:-${{ env.UPSTREAM_REPO }}}"
          case "$RAW_UPSTREAM_REPO" in
            http://*|https://*|git@*)
              UPSTREAM_REPO="$RAW_UPSTREAM_REPO"
              ;;
            */*)
              UPSTREAM_REPO="https://github.com/${RAW_UPSTREAM_REPO%.git}.git"
              ;;
            *)
              echo "无效的 upstream_repo: $RAW_UPSTREAM_REPO"
              exit 1
              ;;
          esac
          CHANNEL="${INPUT_CHANNEL:-stable}"
          case "$CHANNEL" in
            stable|bbr) ;;
            *)
              echo "不支持的 channel: $CHANNEL（仅支持 stable / bbr）"
              exit 1
              ;;
          esac

          if [ -n "$INPUT_REF" ]; then
            VERSION="$INPUT_REF"
          else
            VERSION=$(git ls-remote --tags --refs "${UPSTREAM_REPO}" \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n1)
            if [ -z "$VERSION" ]; then
              VERSION="main"
            fi
          fi

          ALL_REFS="$(git ls-remote "$UPSTREAM_REPO")"
          RESOLVED_SHA="$(printf '%s\n' "$ALL_REFS" | awk -v ref="$VERSION" '
            $2 == ("refs/tags/" ref "^{}") { print $1; exit }
            $2 == ("refs/tags/" ref) { tag_sha=$1 }
            $2 == ("refs/heads/" ref) { head_sha=$1 }
            $2 == ref { raw_sha=$1 }
            END {
              if (tag_sha) print tag_sha;
              else if (head_sha) print head_sha;
              else if (raw_sha) print raw_sha;
            }'
          )"
          if [ -z "$RESOLVED_SHA" ]; then
            if echo "$VERSION" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              if printf '%s\n' "$ALL_REFS" | awk '{print $1}' | grep -Fxiq "$VERSION"; then
                RESOLVED_SHA="$VERSION"
              else
                echo "指定的 commit 不存在于上游仓库: $VERSION"
                exit 1
              fi
            else
              echo "指定的 ref 不存在于上游仓库: $VERSION"
              exit 1
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "upstream_repo=$UPSTREAM_REPO" >> $GITHUB_OUTPUT
          echo "resolved_sha=$RESOLVED_SHA" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "🎯 构建版本: $VERSION"
          echo "📦 上游仓库: $UPSTREAM_REPO"
          echo "🔖 发布通道: $CHANNEL"
          echo "🧬 解析提交: $RESOLVED_SHA"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: lite
            dockerfile: Dockerfile
            suffix: ""
            extra_stable: "latest"
            extra_bbr: "bbr"
          - name: tun
            dockerfile: Dockerfile-tun
            suffix: "-tun"
            extra_stable: "tun"
            extra_bbr: "bbr-tun"
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 ${{ matrix.variant.name }}-${{ matrix.platform }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            USQUE_REPO=${{ needs.prepare.outputs.upstream_repo }}
            USQUE_REF=${{ needs.prepare.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ needs.prepare.outputs.upstream_repo }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.resolved_sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: 导出 digest
        run: |
          mkdir -p /tmp/digests-${{ matrix.variant.name }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-${{ matrix.variant.name }}/${digest#sha256:}"

      - name: 上传 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant.name }}-${{ strategy.job-index }}
          path: /tmp/digests-${{ matrix.variant.name }}/*
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: lite
            suffix: ""
            extra_stable: "latest"
            extra_bbr: "bbr"
          - name: tun
            suffix: "-tun"
            extra_stable: "tun"
            extra_bbr: "bbr-tun"
    steps:
      - name: 下载 digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant.name }}-*
          merge-multiple: true

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建并推送 manifest (${{ matrix.variant.name }})
        working-directory: /tmp/digests
        run: |
          VERSION_TAG="${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}"
          if [ "${{ needs.prepare.outputs.channel }}" = "bbr" ]; then
            VERSION_TAG="${VERSION_TAG}-bbr"
            EXTRA_TAG="${{ matrix.variant.extra_bbr }}"
          else
            EXTRA_TAG="${{ matrix.variant.extra_stable }}"
          fi

          docker buildx imagetools create \
            -t ${{ env.DOCKER_IMAGE }}:${VERSION_TAG} \
            -t ${{ env.DOCKER_IMAGE }}:${EXTRA_TAG} \
            -t ${{ env.GHCR_IMAGE }}:${VERSION_TAG} \
            -t ${{ env.GHCR_IMAGE }}:${EXTRA_TAG} \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: 检查 manifest
        run: |
          VERSION_TAG="${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}"
          if [ "${{ needs.prepare.outputs.channel }}" = "bbr" ]; then
            VERSION_TAG="${VERSION_TAG}-bbr"
            EXTRA_TAG="${{ matrix.variant.extra_bbr }}"
          else
            EXTRA_TAG="${{ matrix.variant.extra_stable }}"
          fi
          docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${VERSION_TAG}
          docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${EXTRA_TAG}
