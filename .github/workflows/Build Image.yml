name: 构建 usque Docker 镜像

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '可选：指定构建的上游 tag/分支/提交（留空则自动取上游最新 tag）'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * *'   # 每天 04:00 UTC 自动检查上游最新 tag

env:
  DOCKER_IMAGE: superng6/usque
  GHCR_IMAGE: ghcr.io/superng6/usque
  UPSTREAM_REPO: https://github.com/Diniboy1123/usque.git

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      skip: ${{ steps.check-exists.outputs.skip }}
    steps:
      - name: 获取上游版本
        id: set-version
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            VERSION="$INPUT_REF"
          else
            VERSION=$(git ls-remote --tags --refs "${{ env.UPSTREAM_REPO }}" \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n1)
            if [ -z "$VERSION" ]; then
              VERSION="main"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🎯 构建版本: $VERSION"

      - name: 检查版本是否已构建
        id: check-exists
        run: |
          # 手动触发时强制构建，不做存在检测
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔨 手动触发，强制构建"
            exit 0
          fi
          VERSION="${{ steps.set-version.outputs.version }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ env.DOCKER_IMAGE }}/tags/${VERSION}/")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ 版本 ${VERSION} 已存在于 Docker Hub，跳过构建"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔨 版本 ${VERSION} 不存在，开始构建"
          fi

  build:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: lite
            suffix: ""
            extra: "latest"
          - name: tun
            suffix: "-tun"
            extra: "tun"
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 ${{ matrix.variant.name }}（全平台）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/amd64/v2,linux/amd64/v3,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          build-args: |
            USQUE_REF=${{ needs.prepare.outputs.version }}
            BUILD_VARIANT=${{ matrix.variant.name }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.DOCKER_IMAGE }}:${{ matrix.variant.extra }}
            ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.GHCR_IMAGE }}:${{ matrix.variant.extra }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}

      - name: 检查 manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true' && needs.prepare.outputs.version != 'main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "⏭️ Release $VERSION 已存在，跳过"
            exit 0
          fi
          gh release create "$VERSION" \
            --title "usque $VERSION" \
            --notes "## Docker 镜像

| 变体 | 镜像 |
|------|------|
| lite | \`${{ env.DOCKER_IMAGE }}:${VERSION}\` |
| tun  | \`${{ env.DOCKER_IMAGE }}:${VERSION}-tun\` |
| lite (GHCR) | \`${{ env.GHCR_IMAGE }}:${VERSION}\` |
| tun  (GHCR) | \`${{ env.GHCR_IMAGE }}:${VERSION}-tun\` |

上游版本：https://github.com/Diniboy1123/usque/releases/tag/${VERSION}"
          echo "✅ Release $VERSION 创建成功"
