name: 构建 usque Docker 镜像

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '可选：指定构建的上游 tag/分支/提交（留空则自动取上游最新 tag）'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * *'   # 每天 04:00 UTC 自动检查上游最新 tag

env:
  DOCKER_IMAGE: superng6/usque
  GHCR_IMAGE: ghcr.io/superng6/usque
  UPSTREAM_REPO: https://github.com/Diniboy1123/usque.git

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: 获取上游版本
        id: set-version
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            VERSION="$INPUT_REF"
          else
            VERSION=$(git ls-remote --tags --refs "${{ env.UPSTREAM_REPO }}" \
              | awk -F/ '{print $3}' \
              | sort -V \
              | tail -n1)
            if [ -z "$VERSION" ]; then
              VERSION="main"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🎯 构建版本: $VERSION"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: lite
            dockerfile: Dockerfile
            suffix: ""
            extra: "latest"
          - name: tun
            dockerfile: Dockerfile-tun
            suffix: "-tun"
            extra: "tun"
        platform:
          - linux/amd64
          - linux/amd64/v2
          - linux/amd64/v3
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 ${{ matrix.variant.name }}-${{ matrix.platform }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            USQUE_REF=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: 导出 digest
        run: |
          mkdir -p /tmp/digests-${{ matrix.variant.name }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-${{ matrix.variant.name }}/${digest#sha256:}"

      - name: 上传 digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant.name }}-${{ strategy.job-index }}
          path: /tmp/digests-${{ matrix.variant.name }}/*
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: lite
            suffix: ""
            extra: "latest"
          - name: tun
            suffix: "-tun"
            extra: "tun"
    steps:
      - name: 下载 digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant.name }}-*
          merge-multiple: true

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建并推送 manifest (${{ matrix.variant.name }})
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }} \
            -t ${{ env.DOCKER_IMAGE }}:${{ matrix.variant.extra }} \
            -t ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }} \
            -t ${{ env.GHCR_IMAGE }}:${{ matrix.variant.extra }} \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: 检查 manifest
        run: |
          docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}
          docker buildx imagetools inspect ${{ env.DOCKER_IMAGE }}:${{ matrix.variant.extra }}